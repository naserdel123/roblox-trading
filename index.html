<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تريدات روبلوكس - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <!-- خلفية متحركة -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- حاوية رئيسية -->
    <div class="auth-container">
        <!-- الشعار -->
        <div class="logo-section">
            <div class="logo-glow"></div>
            <div class="logo">
                <i class="fas fa-exchange-alt"></i>
            </div>
            <h1 class="site-title">تريدات روبلوكس</h1>
            <p class="site-subtitle">منصة التداول الأولى للعرب</p>
        </div>

        <!-- نموذج التسجيل/الدخول -->
        <div class="form-container">
            <div class="form-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab-btn" onclick="switchTab('register')">إنشاء حساب</button>
            </div>

            <!-- نموذج الدخول -->
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="loginUsername" required placeholder="اسم المستخدم">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" required placeholder="كلمة المرور">
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"><i class="fas fa-check"></i></span>
                        <span class="label-text">تذكرني</span>
                    </label>
                </div>

                <button type="submit" class="submit-btn">
                    <span>دخول</span>
                    <i class="fas fa-arrow-left"></i>
                </button>
            </form>

            <!-- نموذج التسجيل -->
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <!-- رفع صورة الأفاتار -->
                <div class="avatar-upload-section">
                    <div class="avatar-upload" onclick="document.getElementById('avatarInput').click()">
                        <input type="file" id="avatarInput" accept="image/*" hidden onchange="previewAvatar(this)">
                        <div class="avatar-placeholder" id="avatarPlaceholder">
                            <i class="fas fa-camera"></i>
                            <span>اختر صورة للأفاتار</span>
                        </div>
                        <img id="avatarPreview" class="avatar-preview">
                        <button type="button" class="remove-avatar" onclick="removeAvatar(event)">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="regUsername" required placeholder="اسم المستخدم" minlength="3">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="email" id="regEmail" required placeholder="البريد الإلكتروني">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="password" id="regPassword" required placeholder="كلمة المرور" minlength="6" oninput="checkPasswordStrength()">
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="password" id="regConfirmPassword" required placeholder="تأكيد كلمة المرور">
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <span>إنشاء حساب</span>
                    <i class="fas fa-user-plus"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <i class="fas fa-exchange-alt"></i>
            </div>
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <p class="loading-text">جاري التحميل...</p>
        </div>
    </div>

    <script>
        // ============================================
        // كود JavaScript مباشر في الصفحة
        // ============================================

        let avatarImage = '';

        // إخفاء شاشة التحميل فوراً
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 800);
        };

        // تبديل التبويبات
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const buttons = document.querySelectorAll('.tab-btn');

            buttons.forEach(btn => btn.classList.remove('active'));

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                buttons[0].classList.add('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                buttons[1].classList.add('active');
            }
        }

        // إظهار/إخفاء كلمة المرور
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.parentElement.querySelector('.toggle-password i');
            
            if (input.type === 'password') {
                input.type = 'text';
                button.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                button.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // قوة كلمة المرور
        function checkPasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const bars = document.querySelectorAll('.strength-bar');
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;

            bars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    if (strength <= 2) bar.classList.add('weak');
                    else if (strength <= 3) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
        }

        // معاينة الأفاتار
        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatarImage = e.target.result;
                    document.getElementById('avatarPreview').src = avatarImage;
                    document.getElementById('avatarPreview').style.display = 'block';
                    document.getElementById('avatarPlaceholder').style.display = 'none';
                    document.querySelector('.remove-avatar').style.display = 'flex';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // حذف الأفاتار
        function removeAvatar(e) {
            e.stopPropagation();
            avatarImage = '';
            document.getElementById('avatarInput').value = '';
            document.getElementById('avatarPreview').style.display = 'none';
            document.getElementById('avatarPlaceholder').style.display = 'flex';
            document.querySelector('.remove-avatar').style.display = 'none';
        }

        // Toast Notification
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };

            toast.innerHTML = '<i class="fas ' + icons[type] + ' toast-icon"></i><span>' + message + '</span>';
            container.appendChild(toast);

            setTimeout(function() {
                toast.remove();
            }, 3000);
        }

        // تسجيل حساب جديد
        function handleRegister(e) {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                showToast('كلمات المرور غير متطابقة!', 'error');
                return;
            }

            // جلب المستخدمين
            let users = JSON.parse(localStorage.getItem('roblox_users') || '[]');
            
            // التحقق من وجود المستخدم
            if (users.find(u => u.username === username)) {
                showToast('اسم المستخدم موجود بالفعل!', 'error');
                return;
            }

            // إنشاء مستخدم جديد مع صورة الأفاتار
            const user = {
                id: Date.now(),
                username: username,
                email: email,
                password: btoa(password),
                avatar: avatarImage || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username
            };

            users.push(user);
            localStorage.setItem('roblox_users', JSON.stringify(users));
            
            showToast('تم إنشاء الحساب بنجاح!', 'success');
            
            // تسجيل الدخول تلقائياً
            setTimeout(function() {
                sessionStorage.setItem('roblox_current_user', JSON.stringify(user));
                window.location.href = 'feed.html';
            }, 1000);
        }

        // تسجيل الدخول
        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            const users = JSON.parse(localStorage.getItem('roblox_users') || '[]');
            const user = users.find(u => u.username === username && atob(u.password) === password);

            if (!user) {
                showToast('اسم المستخدم أو كلمة المرور غير صحيحة!', 'error');
                return;
            }

            if (rememberMe) {
                localStorage.setItem('roblox_remember', username);
            }

            sessionStorage.setItem('roblox_current_user', JSON.stringify(user));
            showToast('مرحباً ' + username + '!', 'success');
            
            setTimeout(function() {
                window.location.href = 'feed.html';
            }, 500);
        }

        // التحقق من تذكرني عند التحميل
        const remembered = localStorage.getItem('roblox_remember');
        if (remembered) {
            document.getElementById('loginUsername').value = remembered;
            document.getElementById('rememberMe').checked = true;
        }
    </script>
</body>
                  </html>
